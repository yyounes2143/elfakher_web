<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إعداد النظام - لوحة تحكم الفاخر</title>

    <!-- CSS Libraries -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap"
        rel="stylesheet">

    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 0;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            width: 100%;
            max-width: 500px;
            padding: 2.5rem;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .brand-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .brand-logo i {
            font-size: 3rem;
            color: #d97706;
            margin-bottom: 1rem;
        }

        .brand-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1f2937;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .input-group i {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }

        .form-input {
            width: 100%;
            padding: 0.75rem 2.5rem 0.75rem 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            transition: all 0.3s ease;
            outline: none;
            font-family: inherit;
        }

        .form-input:focus {
            border-color: #d97706;
            box-shadow: 0 0 0 3px rgba(217, 119, 6, 0.1);
        }

        .flex-row-inputs {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .flex-row-inputs .input-group {
            margin-bottom: 0;
            flex: 1;
        }

        .btn-primary {
            width: 100%;
            padding: 0.875rem;
            background: #d97706;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-top: 1rem;
        }

        .btn-primary:hover {
            background: #b45309;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(217, 119, 6, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .error-message {
            color: #ef4444;
            text-align: center;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            background: #fee2e2;
            padding: 0.5rem;
            border-radius: 8px;
            display: none;
        }

        .loading {
            opacity: 0.7;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="brand-logo">
            <i class="fas fa-cogs"></i>
            <h1 class="brand-title">إعداد النظام لأول مرة</h1>
            <p class="text-gray-500 text-sm mt-1">مرحباً بك! يرجى إنشاء حساب المدير الأول للبدء.</p>
        </div>

        <div id="errorMsg" class="error-message"></div>

        <form id="setupForm">
            <div class="flex-row-inputs">
                <div class="input-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="firstName" class="form-input" placeholder="الاسم الأول" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-user-tag"></i>
                    <input type="text" id="lastName" class="form-input" placeholder="الاسم الأخير" required>
                </div>
            </div>

            <div class="input-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" class="form-input" placeholder="البريد الإلكتروني" required>
            </div>

            <div class="input-group">
                <i class="fas fa-phone"></i>
                <input type="text" id="phone" class="form-input" placeholder="رقم الهاتف (مثال: 0555123456)" required>
            </div>

            <div class="flex-row-inputs">
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" class="form-input" placeholder="كلمة المرور" required>
                </div>
                <div class="input-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="confirmPassword" class="form-input" placeholder="تأكيد المرور" required>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="btn-primary">
                <i class="fas fa-check-circle ml-2"></i> إنشاء حساب المدير والدخول
            </button>
        </form>
    </div>

    <script>
        document.getElementById('setupForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const first_name = document.getElementById('firstName').value;
            const last_name = document.getElementById('lastName').value;
            const email = document.getElementById('email').value;
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            const btn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMsg');

            if (password !== confirmPassword) {
                showError('كلمة المرور غير متطابقة!');
                return;
            }

            btn.classList.add('loading');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري إعداد النظام...';
            errorMsg.style.display = 'none';

            try {
                const response = await fetch('/api/auth/setup', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ first_name, last_name, email, phone, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    // حفظ التوكن وبيانات المستخدم
                    localStorage.setItem('elfakher_token', data.token);
                    localStorage.setItem('elfakher_user', JSON.stringify(data.user));

                    btn.innerHTML = '<i class="fas fa-check"></i> تم إنشاء الحساب بنجاح!';
                    btn.style.background = '#10b981'; // Green

                    // توجيه للوحة التحكم
                    setTimeout(() => {
                        window.location.href = '/admin/index.html';
                    }, 1000);
                } else {
                    throw new Error(data.message || 'حدث خطأ غير معروف');
                }
            } catch (error) {
                showError(error.message);
                btn.classList.remove('loading');
                btn.innerHTML = '<i class="fas fa-check-circle ml-2"></i> إنشاء حساب المدير والدخول';
            }
        });

        function showError(msg) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = msg;
            errorMsg.style.display = 'block';

            document.querySelector('.login-card').animate([
                { transform: 'translateX(0)' },
                { transform: 'translateX(-10px)' },
                { transform: 'translateX(10px)' },
                { transform: 'translateX(0)' }
            ], { duration: 300 });
        }
    </script>
</body>

</html>
